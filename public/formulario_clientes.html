<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reserva & Bolos | Nossa Carne</title>

    <!-- Material Design Icons -->
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/formulario_clientes.css">

</head>

<body>

    <div class="overlay-click" id="overlay"></div>

    <div class="container">
        <div class="header">
            <img src="https://static.ifood-static.com.br/image/upload/t_high/logosgde/ef733dfb-3edf-42ef-9aea-9a87b00dcbdc/202510141310_BXc1_i.png"
                alt="Nossa Carne">
            <h2>Reserva Nossa Carne</h2>
        </div>

        <div class="regras-box" id="regras-box">
            Carregando regras...
        </div>

        <form id="reservaForm">
            <div class="campo">
                <label>Seu Nome</label>
                <div class="input-container">
                    <i class="mdi mdi-account"></i>
                    <input type="text" id="nome" placeholder="Nome completo" required oninput="validarFluxo()">
                </div>
            </div>

            <div class="campo">
                <label>WhatsApp</label>
                <div class="input-container">
                    <i class="mdi mdi-whatsapp"></i>
                    <input type="text" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15" required
                        oninput="maskPhone(this); validarFluxo()">
                </div>
            </div>

            <div class="grid-duplo">
                <div class="campo">
                    <label>Data (Seg a Qui)</label>
                    <div class="input-container">
                        <div id="data" class="select-simulado" data-value="">
                            <i class="mdi mdi-calendar"></i>
                            <span>Selecione a data</span>
                        </div>
                        <div id="calendarPanel" class="calendar-panel">
                            <div class="calendar-header">
                                <button type="button" onclick="mudarMes(-1); event.stopPropagation();"><i
                                        class="mdi mdi-chevron-left left-arrow"></i></button>
                                <span id="monthYearLabel"></span>
                                <button type="button" onclick="mudarMes(1); event.stopPropagation();"><i
                                        class="mdi mdi-chevron-right right-arrow"></i></button>
                            </div>
                            <div class="calendar-grid"></div>
                        </div>
                    </div>
                </div>
                <div class="campo">
                    <label>Hora (12h-21:30)</label>
                    <div class="input-container">
                        <div id="horario" class="select-simulado" data-value="">
                            <i class="mdi mdi-clock-outline"></i>
                            <span>Selecione a hora</span>
                        </div>
                        <div class="options-container" id="horario-options">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="campo">
                <label>Nº de Convidados (Mín. 10)</label>
                <div class="input-container">
                    <div id="pessoas" class="select-simulado" data-value="">
                        <i class="mdi mdi-account-group"></i>
                        <span>Selecione</span>
                    </div>
                    <div class="options-container" id="pessoas-options">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>

            <div class="campo">
                <label>Deseja Bolo?</label>
                <div class="input-container">
                    <div id="querBolo" class="select-simulado" data-value="nao">
                        <i class="mdi mdi-cake-variant"></i>
                        <span>Selecione uma opção</span>
                    </div>
                    <div class="options-container" id="querBolo-options">
                        <div class="option" data-value="nao">Não, apenas a mesa</div>
                        <div class="option" data-value="sim">Sim, desejo o bolo cortesia 🎂</div>
                    </div>
                </div>
            </div>

            <div id="painelBolo" class="secao-bolo">
                <div id="tipoBoloBadge" class="badge badge-cortesia">🎁 1kg Cortesia Aplicado</div>

                <div class="campo">
                    <label>Sabor do Bolo</label>
                    <div class="input-container">
                        <div id="sabor" class="select-simulado" data-value="">
                            <i class="mdi mdi-format-list-bulleted"></i>
                            <span>Selecione o sabor</span>
                        </div>
                        <div class="options-container" id="sabor-options">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                </div>

                <div class="campo">
                    <label id="label-kg">Quilos (Sinal para kg adicional)</label>
                    <div class="input-container">
                        <i class="mdi mdi-weight-kilogram"></i>
                        <input type="number" id="kg" min="1" value="1" oninput="validarFluxo()">
                    </div>
                </div>

                <div id="detalhesFinanceiros" class="info-pagamento" style="display:none;">
                    <b>Total Excedente: R$ <span id="valorTotal">0,00</span></b><br>
                    <small>Sinal de 50% via PIX para quilos extras.</small>

                    <div id="pixPagamento"
                        style="display:none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                        <img id="qrCode" src="" width="140"
                            style="margin:10px auto; border: 4px solid #fff; border-radius: 10px; display:block;">
                        <div class="pix-code-display" id="pixCopiaCola">
                            <!-- Populated via JS -->
                        </div>
                        <button type="button" onclick="copiarPix()"
                            style="background:#f39c12; border:none; color:#fff; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer; width:100%;">COPIAR
                            PIX</button>
                        <div id="valorInfo"
                            style="margin: 10px 0; font-weight: bold; font-size: 14px; color:var(--primary); background: #eee; padding: 8px; border-radius: 5px;">
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" id="btnEnviar" class="btn-enviar" onclick="enviarWhatsApp()" disabled>
                <i class="mdi mdi-whatsapp"></i> ENVIAR RESERVA
            </button>
        </form>
    </div>

    <script src="js/formulario_clientes.js"></script>


</body>

</html>
