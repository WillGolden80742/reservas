<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaPro - Gestão Inteligente</title>

    <!-- Montserrat Font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Material Design Icons (MDI) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="home-page" class="home-page-container">
        <div class="home-panel">
            <div class="home-header">
                <img src="/images/bg.png" alt="Logo" class="home-logo">
                <h1>ReservaPro</h1>
                <p>Gestão Inteligente de Reservas</p>
            </div>
            
            <div class="buttons-grid">
                <a href="/form" class="home-button">
                    <div class="button-icon">
                        <span class="mdi mdi-calendar"></span>
                    </div>
                    <h3>Nova Reserva</h3>
                </a>
                
                <a href="/admin" class="home-button">
                    <div class="button-icon">
                        <span class="mdi mdi-cog"></span>
                    </div>
                    <h3>Painel Administrativo</h3>
                </a>
            </div>
        </div>
    </div>

    <!-- External JS Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
